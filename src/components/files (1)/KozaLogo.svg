<svg xmlns="http://www.w3.org/2000/svg" width="200" height="56" viewBox="0 0 200 56" fill="none">
  <!-- KOZA — Terminal / DOS style logo. Lines only, no curves, double-stroke weight -->
  <!-- Built from: | / \ _ only -->

  <!-- K — vertical bar + two diagonals -->
  <line x1="8"  y1="4"  x2="8"  y2="52" stroke="currentColor" stroke-width="4" stroke-linecap="square"/>
  <line x1="15" y1="4"  x2="15" y2="52" stroke="currentColor" stroke-width="4" stroke-linecap="square"/>
  <line x1="15" y1="28" x2="40" y2="4"  stroke="currentColor" stroke-width="4" stroke-linecap="square"/>
  <line x1="18" y1="31" x2="43" y2="7"  stroke="currentColor" stroke-width="4" stroke-linecap="square"/>
  <line x1="15" y1="28" x2="40" y2="52" stroke="currentColor" stroke-width="4" stroke-linecap="square"/>
  <line x1="18" y1="25" x2="43" y2="49" stroke="currentColor" stroke-width="4" stroke-linecap="square"/>

  <!-- O — two verticals + top/bottom bars -->
  <line x1="54" y1="4"  x2="54" y2="52" stroke="currentColor" stroke-width="4" stroke-linecap="square"/>
  <line x1="61" y1="4"  x2="61" y2="52" stroke="currentColor" stroke-width="4" stroke-linecap="square"/>
  <line x1="84" y1="4"  x2="84" y2="52" stroke="currentColor" stroke-width="4" stroke-linecap="square"/>
  <line x1="91" y1="4"  x2="91" y2="52" stroke="currentColor" stroke-width="4" stroke-linecap="square"/>
  <line x1="54" y1="4"  x2="91" y2="4"  stroke="currentColor" stroke-width="4" stroke-linecap="square"/>
  <line x1="54" y1="11" x2="91" y2="11" stroke="currentColor" stroke-width="4" stroke-linecap="square"/>
  <line x1="54" y1="45" x2="91" y2="45" stroke="currentColor" stroke-width="4" stroke-linecap="square"/>
  <line x1="54" y1="52" x2="91" y2="52" stroke="currentColor" stroke-width="4" stroke-linecap="square"/>

  <!-- Z — top bar + diagonal + bottom bar -->
  <line x1="103" y1="4"  x2="138" y2="4"  stroke="currentColor" stroke-width="4" stroke-linecap="square"/>
  <line x1="103" y1="11" x2="138" y2="11" stroke="currentColor" stroke-width="4" stroke-linecap="square"/>
  <line x1="136" y1="7"  x2="106" y2="49" stroke="currentColor" stroke-width="4" stroke-linecap="square"/>
  <line x1="143" y1="7"  x2="113" y2="49" stroke="currentColor" stroke-width="4" stroke-linecap="square"/>
  <line x1="103" y1="45" x2="138" y2="45" stroke="currentColor" stroke-width="4" stroke-linecap="square"/>
  <line x1="103" y1="52" x2="138" y2="52" stroke="currentColor" stroke-width="4" stroke-linecap="square"/>

  <!-- A — two diagonals + crossbar -->
  <line x1="168" y1="4"  x2="150" y2="52" stroke="currentColor" stroke-width="4" stroke-linecap="square"/>
  <line x1="175" y1="4"  x2="157" y2="52" stroke="currentColor" stroke-width="4" stroke-linecap="square"/>
  <line x1="168" y1="4"  x2="186" y2="52" stroke="currentColor" stroke-width="4" stroke-linecap="square"/>
  <line x1="161" y1="4"  x2="179" y2="52" stroke="currentColor" stroke-width="4" stroke-linecap="square"/>
  <line x1="155" y1="33" x2="181" y2="33" stroke="currentColor" stroke-width="4" stroke-linecap="square"/>
  <line x1="154" y1="40" x2="180" y2="40" stroke="currentColor" stroke-width="4" stroke-linecap="square"/>
</svg>
